name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ─── Job 1: Lint application code ───────────────────────────
  lint-app:
    name: Lint Application Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npx eslint . --ext .js,.ts --max-warnings 0

  # ─── Job 2: Lint Terraform ───────────────────────────────────
  lint-terraform:
    name: Lint Terraform Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Initialise tflint
        run: tflint --init

      - name: Run tflint
        run: tflint --recursive

  # ─── Job 3: Vulnerability scan ───────────────────────────────
  security-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  # ─── Job 4: Quality gate (runs only if all above pass) ───────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [ lint-app, lint-terraform, security-scan ]
    steps:
      - name: All checks passed
        run: echo "All quality gates passed — safe to proceed"